services:
  # NOTE: Run with: docker compose up -d
  swe-db:
    image: postgres:16-alpine
    container_name: swe-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swe_pw}
      POSTGRES_DB: ${POSTGRES_DB:-swe_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-swe_user} -d ${POSTGRES_DB:-swe_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  # NOTE: (OPTIONAL) Run with: docker compose --profile containerized up
  swe-api:
    profiles: ["containerized"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swe-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swe_user}:${POSTGRES_PASSWORD:-swe_pw}@swe-db:5432/${POSTGRES_DB:-swe_db}
      NODE_ENV: development
    depends_on:
      swe-db:
        condition: service_healthy
    volumes:
      - .:/usr/src/swe-api
      - /usr/src/swe-api/node_modules

volumes:
  pgdata:
